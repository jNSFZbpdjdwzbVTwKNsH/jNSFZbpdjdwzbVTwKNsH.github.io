{% assign posts = site.collections | where: "label", include.collection | first %}

{% for page in posts.docs reversed %}

	<!-- Skip the index page -->
	{%-if page.url contains "index" -%}
	{%- continue -%}
	{%- endif -%}

	<p><a href="{{ page.url | relative_url }}">{{ page.title }}</a></p>
{% endfor %}
