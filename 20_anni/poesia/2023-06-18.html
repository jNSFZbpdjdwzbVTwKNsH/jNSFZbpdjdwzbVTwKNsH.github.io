        <h2>Gatto</h2>
<article class="body">
<p>Sono un gatto:<br />
se cado atterro in piedi.<br />
Sono un uomo:<br />
la mia testa è piena di pare.<br />
Sono un ragazzo:<br />
uno sbaglio oggi,<br />
si traduce in esperienza<br />
e sta a me estrarre la lezione</p>

</article>
