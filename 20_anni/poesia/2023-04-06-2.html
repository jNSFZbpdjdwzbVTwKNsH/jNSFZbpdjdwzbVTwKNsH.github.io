        <h2>Auronzo</h2>
<article class="body">
<p>In mezzo ad un bosco,<br />
Il posto magico, calmo,<br />
C’è vento, tanto vento,<br />
Come in Danimarca,<br />
Sopra l’albero si vede tutto<br />
E si trema,<br />
Ma ci sono le ancore<br />
E il lago smeraldo e<br />
Auronzo</p>

</article>
