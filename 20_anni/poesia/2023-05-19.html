        <h2>Immobile</h2>
<article class="body">
<p>Voglio correre,<br />
voglio scappare.<br />
La testa non mi segue, non mi ascolta,<br />
si impunta, testarda.</p>

<p>Perchè se dico “basta!”,<br />
non è mai finita?</p>
