---
layout: default
---

<a href="{{ site.url }}/{{ page.collection }}">{{
	site.theme_config.back_home_text }}</a>

<article>
	<h2>{{ page.title }}</h2>
	{{ content }}
</article>

<br>
{% if page.previous.url %}
  <a class="page-link" href="{{ page.previous.url | relative_url }}"
	  data-toggle="tooltip" data-placement="top" title="{{page.previous.title |
	  strip_html | xml_escape}}">&larr; Precedente {{ page.collection }}</a>
{% endif %}
{% if page.next.url %}
  <a class="page-link" href="{{ page.next.url | relative_url }}"
	  data-toggle="tooltip" data-placement="top" title="{{page.next.title |
	  strip_html | xml_escape}}">Prossima {{ page.collection }} &rarr;</a>
{% endif %}
