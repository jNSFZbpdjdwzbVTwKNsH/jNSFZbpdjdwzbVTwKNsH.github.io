<h2>22/05</h2>
<p>“Would you tell me, please, which way I ought to go from here?”<br />
“That depends a good deal on where you want to get to”<br />
“I don’t much care where -“<br />
“Then it doesn’t matter which way you walk”<br />
“- so long as I get somewhere”</p>
