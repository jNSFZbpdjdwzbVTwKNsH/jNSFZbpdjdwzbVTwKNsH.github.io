<h2>Grava</h2>
<p>È giugno,<br />
Non c’è vento,<br />
Il male di vivere:<br />
il sole e i sassi e l’afa.<br />
Ma fiumeggia, dalle montagne,<br />
acqua troppo fredda</p>
