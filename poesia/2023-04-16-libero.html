<h2>Libero</h2>
<p>Sono un palloncino che vola via,<br />
una mongolfiera che sale in cielo,<br />
un uccello che vola tra le nuvole.<br />
Sono un’aquila che cerca la sua cena,<br />
un topo che trova del formaggio,<br />
l’acqua di un fiume,<br />
una persona con uno scopo!</p>
