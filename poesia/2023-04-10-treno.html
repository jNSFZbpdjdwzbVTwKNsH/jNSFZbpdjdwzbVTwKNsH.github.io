<h2>Treno</h2>
<p>che strano essere a casa<br />
e prendere un treno<br />
per tornare a casa.<br />
che strano mezzo il treno,<br />
mi mette estrema calma, tranquillità e staticità.<br />
Yet it moves so fast!</p>
